{% extends 'home/base.html' %}

{% block body %}
<section class="min-h-screen flex items-center justify-center bg-gradient-to-tr from-black via-gray-900 to-red-900 p-6">
  <div class="bg-gray-950 border border-gray-800 shadow-xl rounded-2xl w-full max-w-xl p-8 transition-all duration-500 hover:shadow-2xl hover:scale-[1.01]">

    {% for message in messages %}
      <div class="mb-4 p-3 rounded-md text-sm text-white font-medium
        {% if message.tags == 'error' %} bg-red-600 
        {% elif message.tags == 'success' %} bg-green-600 
        {% elif message.tags == 'warning' %} bg-yellow-500 text-black 
        {% else %} bg-blue-600 
        {% endif %}">{{ message }}</div>
    {% endfor %}

    <h2 class="text-3xl font-bold text-center text-white mb-6 tracking-wide">Create Your Account</h2>

    <form method="POST" class="space-y-6 animate-fade-in-up">
      {% csrf_token %}
      
      <!-- Username -->
      <div>
        <label for="username" class="block text-sm text-gray-400 mb-1">Username</label>
        <input type="text" name="username" id="username" required
          class="w-full px-4 py-2 rounded-lg bg-gray-800 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500">
      </div>

      <!-- First Name -->
      <div>
        <label for="first_name" class="block text-sm text-gray-400 mb-1">First Name</label>
        <input type="text" name="first_name" id="first_name" required
          class="w-full px-4 py-2 rounded-lg bg-gray-800 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500">
      </div>

      <!-- Last Name -->
      <div>
        <label for="last_name" class="block text-sm text-gray-400 mb-1">Last Name</label>
        <input type="text" name="last_name" id="last_name" required
          class="w-full px-4 py-2 rounded-lg bg-gray-800 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500">
      </div>

      <!-- Email -->
      <div>
        <label for="email" class="block text-sm text-gray-400 mb-1">Email</label>
        <input type="email" name="email" id="email" required
          class="w-full px-4 py-2 rounded-lg bg-gray-800 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500">
      </div>

      <!-- Password -->
      <div>
        <label for="password" class="block text-sm text-gray-400 mb-1">Password</label>
        <input type="password" name="password" id="password" required
          class="w-full px-4 py-2 rounded-lg bg-gray-800 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500">
      </div>

      <!-- Confirm Password -->
      <div>
        <label for="confirm_password" class="block text-sm text-gray-400 mb-1">Confirm Password</label>
        <input type="password" name="confirm_password" id="confirm_password" required
          class="w-full px-4 py-2 rounded-lg bg-gray-800 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500">
      </div>

      <!-- Register Button -->
      <button type="submit"
        class="w-full py-2 rounded-lg bg-gradient-to-r from-red-600 to-red-800 hover:from-red-700 hover:to-red-900 text-white font-semibold shadow-md hover:shadow-lg transition duration-300">
        Register
      </button>
    </form>

    <p class="mt-5 text-center text-sm text-gray-400">
      Already have an account? 
      <a href="{% url 'login' %}" class="text-red-400 hover:underline">Login here</a>
    </p>
  </div>
</section>

<style>
  @keyframes fade-in-up {
    0% {
      opacity: 0;
      transform: translateY(20px);
    }
    100% {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .animate-fade-in-up {
    animation: fade-in-up 0.6s ease-out;
  }
</style>
{% endblock %}
