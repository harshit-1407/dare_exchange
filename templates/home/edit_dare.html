{% extends 'home/base.html' %}

{% block body %}
<div class="flex items-center justify-center min-h-screen bg-gradient-to-tr from-black via-gray-900 to-red-900 p-6">
    <div class="bg-gray-950 rounded-2xl shadow-2xl p-10 max-w-2xl w-full border border-gray-800">
    <!-- <div
        class="bg-white bg-opacity-10 backdrop-blur-sm shadow-lg p-8 max-w-sm sm:max-w-md md:max-w-lg w-full rounded-2xl border border-red-500"> -->

        <h2 class="text-4xl font-bold text-center text-white mb-8">❤️‍🔥Edit {{ dare.name }}✒️</h2>

        <form method="POST" class="space-y-8">
            {% csrf_token %}
            <div>
                <label class="block text-gray-300 font-semibold mb-2" for="name">Name</label>
                <input type="text" id="name" name="name" required value="{{ dare.name }}"
                    class="w-full p-4 rounded-lg bg-gray-800 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-red-600 text-lg" />
            </div>

            <div>
                <label class="block text-gray-300 font-semibold mb-2" for="email">Email</label>
                <input type="email" id="email" name="email" required value="{{ dare.email }}"
                    class="w-full p-4 rounded-lg bg-gray-800 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-red-600 text-lg" />
            </div>

            <div>
                <label class="block text-gray-300 font-semibold mb-2" for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone_number" pattern="[0-9]{10}" required
                    value="{{ dare.phone_number }}"
                    class="w-full p-4 rounded-lg bg-gray-800 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-red-600 text-lg" />
            </div>

            <div>
                <label class="block text-gray-300 font-semibold mb-2" for="deadline">Deadline</label>
                <input type="date" id="deadline" name="deadline" required value="{{ dare.deadline|date:'Y-m-d' }}"
                    class="w-full p-4 rounded-lg bg-gray-800 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-red-600 text-lg" />
            </div>

            <div>
                <label class="block text-gray-300 font-semibold mb-2" for="description">Dare Description</label>
                <textarea id="description" name="dare" rows="5" required
                    class="w-full p-4 rounded-lg bg-gray-800 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-red-600 text-lg resize-none">{{ dare.dare }}</textarea>
            </div>

            <button type="submit"
                class="w-full bg-gradient-to-r from-red-600 to-red-800 hover:from-red-700 hover:to-red-900 text-white py-4 rounded-lg font-semibold text-lg shadow-md hover:shadow-xl transition duration-300">
                Update Dare✨
            </button>
        </form>

        <p id="successMessage" class="text-green-400 font-semibold mt-6 text-center hidden">
            Dare submitted ho gya!!!!
        </p>
    </div>
</div>
{% endblock %}
