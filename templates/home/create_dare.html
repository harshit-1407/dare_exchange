{% extends 'home/base.html' %}

{% block body %}
<section class="min-h-screen flex items-center justify-center bg-gradient-to-tr from-black via-gray-900 to-red-900 p-6">
  <div class="bg-gray-950 border border-gray-800 shadow-xl rounded-2xl w-full max-w-2xl p-8 transition-all duration-500 hover:shadow-2xl hover:scale-[1.01]">

    {% for message in messages %}
      <div class="mb-4 p-3 rounded-md text-sm text-white font-medium
        {% if message.tags == 'error' %} bg-red-600 
        {% elif message.tags == 'success' %} bg-green-600 
        {% elif message.tags == 'warning' %} bg-yellow-500 text-black 
        {% else %} bg-blue-600 
        {% endif %}">
        {{ message }}
      </div>
    {% endfor %}

    <h2 class="text-3xl font-bold text-center text-white mb-6 tracking-wide">Create a Dare🔥</h2>

    <form method="POST" class="space-y-6 animate-fade-in-up">
      {% csrf_token %}

      <div>
        <label class="block text-gray-300 text-sm mb-1" for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your Name" required
          class="w-full p-3 rounded-lg bg-gray-800 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-600">
      </div>

      <div>
        <label class="block text-gray-300 text-sm mb-1" for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required
          class="w-full p-3 rounded-lg bg-gray-800 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-600">
      </div>

      <div>
        <label class="block text-gray-300 text-sm mb-1" for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone_number" placeholder="10-Digit Number" required
          class="w-full p-3 rounded-lg bg-gray-800 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-600">
      </div>

      <div>
        <label class="block text-gray-300 text-sm mb-1" for="deadline">Deadline</label>
        <input type="date" id="deadline" name="deadline" required
          class="w-full p-3 rounded-lg bg-gray-800 text-white focus:outline-none focus:ring-2 focus:ring-red-600">
      </div>

      <div>
        <label class="block text-gray-300 text-sm mb-1" for="description">Dare Description</label>
        <textarea id="description" name="dare" rows="4" placeholder="Describe the dare in detail..." required
          class="w-full p-3 rounded-lg bg-gray-800 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-600 resize-none"></textarea>
      </div>

      <button type="submit"
        class="w-full bg-gradient-to-r from-red-600 to-red-800 hover:from-red-700 hover:to-red-900 text-white py-3 rounded-lg font-semibold shadow-md hover:shadow-lg transition duration-300">
        Submit Dare🤛🤜
      </button>
    </form>

    <p id="successMessage" class="text-green-400 font-semibold mt-4 text-center hidden">
      Dare submitted ho gya!!!!
    </p>
  </div>
</section>

<style>
  @keyframes fade-in-up {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .animate-fade-in-up {
    animation: fade-in-up 0.5s ease-out;
  }
</style>
{% endblock %}
