{% extends 'home/base.html' %}
{% load static %}

{% block body %}
<!-- Hero Section -->
<section class="w-screen h-screen relative overflow-hidden">

  <!-- Background image -->
  <img src="{% static 'images/flames.jpg' %}" alt="background" class="absolute inset-0 object-cover w-full h-full" />

  <!-- Dark overlay -->
  <div class="absolute inset-0 bg-black bg-opacity-70"></div>

  <!-- Content -->
  <div class="relative z-10 flex items-center justify-center h-full px-4 py-10">
    <div class="text-center max-w-2xl animate-fade-in">
      <!-- <h1 class="text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-yellow-300 mb-6 drop-shadow-xl tracking-wide animate-glow">
        Dare to be Legendary 🔥
      </h1> -->
      <!-- <h1 class="text-5xl sm:text-6xl font-extrabold text-orange-500 drop-shadow-lg tracking-wide animate-fade-in"
        style="font-family: 'Orbitron', sans-serif;">
        🔥 Dare to be <span class="text-white">Legendary</span>
      </h1> -->
      <!-- <h1 class="text-6xl sm:text-7xl font-bold text-orange-500 drop-shadow-xl tracking-wider animate-fade-in flex items-center justify-center gap-2" style="font-family: 'Orbitron', sans-serif;">
            🔥 <span>Dare to be <span class="text-white">Legendary</span></span>
      </h1> -->
      <h1
        class="text-6xl sm:text-7xl font-bold text-orange-500 tracking-wider animate-fade-in drop-shadow-[0_0_15px_rgba(255,115,0,0.8)]"
        style="font-family: 'Orbitron', sans-serif;">
        🔥Dare to be <span class="text-white drop-shadow-[0_0_20px_rgba(255,255,255,0.9)]">Legendary</span>
      </h1>

      <br>
      <p class="text-xl text-gray-200 mb-10 drop-shadow-md animate-slide-up delay-100">
        Set wild challenges. Accept the heat. Rise on the leaderboard!
      </p>

      {% if request.user.is_authenticated %}
      <div class="flex flex-col sm:flex-row justify-center gap-5">
        <a href="{% url 'create_dare' %}"
          class="bg-orange-600 hover:bg-orange-700 text-white py-3 px-8 rounded-full font-semibold shadow-lg transition-all duration-300 transform hover:scale-105">
          ➕ Add a Dare
        </a>
        <a href="{% url 'dares' %}"
          class="bg-white hover:bg-gray-100 text-orange-700 border border-orange-500 py-3 px-8 rounded-full font-semibold shadow-lg transition-all duration-300 transform hover:scale-105">
          🎯 View Dares
        </a>
      </div>
      {% else %}
      <div class="flex justify-center mt-6">
        <a href="{% url 'login' %}"
          class="bg-orange-500 hover:bg-orange-600 text-white py-3 px-10 rounded-full font-bold shadow-lg transition-all duration-300 transform hover:scale-105">
          🔐 Login to Start Daring!
        </a>
      </div>
      {% endif %}
    </div>
  </div>

  <!-- Scroll down hint -->
  <!-- <div class="absolute bottom-5 left-1/2 transform -translate-x-1/2 z-10 animate-bounce">
    <span class="text-gray-300 text-sm">Scroll Down</span>
    <div class="w-6 h-6 border-2 border-gray-300 rounded-full mt-1"></div>
  </div> -->

</section>

<!-- Animations -->
<style>
  @keyframes fade-in {
    from {
      opacity: 0;
      transform: translateY(20px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes slide-up {
    from {
      opacity: 0;
      transform: translateY(40px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes glow {

    0%,
    100% {
      text-shadow: 0 0 10px #ffa500, 0 0 20px #ff8c00, 0 0 30px #ff4500;
    }

    50% {
      text-shadow: 0 0 15px #ffb347, 0 0 25px #ff6347, 0 0 35px #ff4500;
    }
  }

  .animate-fade-in {
    animation: fade-in 1.2s ease forwards;
  }

  .animate-slide-up {
    animation: slide-up 1.2s ease forwards;
  }

  .animate-glow {
    animation: glow 2s infinite alternate;
  }

  .delay-100 {
    animation-delay: 0.3s;
  }
</style>
{% endblock %}
